name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so Next.js generates its type artifacts before the type-check.
      - name: Build web app
        run: pnpm --filter @forgecast/web build

      - name: Type-check (all packages)
        run: pnpm typecheck

      - name: Test
        run: pnpm test
